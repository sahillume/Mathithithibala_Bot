<!DOCTYPE html>
<html>
<head>
  <title>Mathithibala Bot Panel</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #0d1117;
      color: white;
      padding-top: 100px;
    }

    input {
      padding: 12px;
      width: 250px;
      border-radius: 8px;
      border: none;
      margin-bottom: 10px;
    }

    button {
      padding: 12px 20px;
      border: none;
      border-radius: 8px;
      background: #00ffcc;
      cursor: pointer;
      font-weight: bold;
    }

    .code {
      margin-top: 20px;
      font-size: 24px;
      color: #00ffcc;
    }
  </style>
</head>
<body>

  <h1>🤖 Mathithibala Bot Panel</h1>

  <input id="number" placeholder="Enter number (2783xxxxxxx)">
  <br>
  <button onclick="generate()">Generate Pair Code</button>

  <div class="code" id="code"></div>

  <script>
    async function generate() {
      const number = document.getElementById("number").value;

      const res = await fetch('/pair', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ number })
      });

      const data = await res.json();

      if (data.code) {
        document.getElementById("code").innerText = "CODE: " + data.code;
      } else {
        document.getElementById("code").innerText = data.error;
      }
    }
  </script>

</body>
</html>
