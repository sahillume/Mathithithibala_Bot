<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mathithibala Bot Panel</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f0f0f;
      color: #fff;
      text-align: center;
    }

    .container {
      padding: 30px;
    }

    h1 {
      color: #00ffcc;
    }

    input {
      padding: 12px;
      width: 250px;
      border-radius: 8px;
      border: none;
      outline: none;
      margin-top: 20px;
    }

    button {
      padding: 12px 20px;
      margin-top: 15px;
      border: none;
      border-radius: 8px;
      background: #00ffcc;
      color: #000;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #00ccaa;
    }

    .card {
      margin-top: 30px;
      background: #1a1a1a;
      padding: 20px;
      border-radius: 12px;
      display: inline-block;
      min-width: 300px;
    }

    .code {
      font-size: 22px;
      color: #00ffcc;
      margin-top: 10px;
      font-weight: bold;
    }

    .status {
      margin-top: 10px;
      color: #aaa;
    }

    footer {
      margin-top: 50px;
      font-size: 12px;
      color: #555;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>🤖 Mathithibala Bot Panel</h1>
    <p>Powered by Professor Sahil</p>

    <input id="number" placeholder="Enter WhatsApp number (e.g 2783xxxxxxx)" />

    <br />

    <button onclick="generate()">Generate Pair Code</button>

    <div class="card">
      <h3>🔐 Pair Code</h3>
      <div class="code" id="code">----</div>
      <div class="status" id="status">Waiting...</div>
    </div>

    <footer>
      ⚡ WhatsApp Bot Hosting Panel | Mathithibala_Bot
    </footer>
  </div>

<script>
async function generate() {
  const number = document.getElementById("number").value;

  if (!number) {
    alert("Enter a number first");
    return;
  }

  document.getElementById("status").innerText = "Generating pair code...";

  try {
    const res = await fetch("http://localhost:3000/pair", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ number })
    });

    const data = await res.json();

    if (data.code) {
      document.getElementById("code").innerText = data.code;
      document.getElementById("status").innerText = "Code generated successfully";
    } else {
      document.getElementById("status").innerText = "Failed: " + (data.error || "unknown");
    }

  } catch (err) {
    document.getElementById("status").innerText = "Server error";
  }
}
</script>

</body>
</html>
